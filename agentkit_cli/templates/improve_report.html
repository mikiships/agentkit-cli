<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agentkit improve — {{REPO_NAME}}</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --text: #c9d1d9;
    --dim: #8b949e;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 2.5rem 2rem;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 { font-size: 2rem; margin-bottom: 0.4rem; }
  .tagline { color: var(--dim); font-size: 0.95rem; margin-bottom: 2rem; }
  .hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
    margin-bottom: 2rem;
  }
  .hero h2 { font-size: 1.1rem; color: var(--dim); margin-bottom: 1.25rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .score-row { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .score-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.5rem;
    min-width: 130px;
    flex: 1;
    text-align: center;
  }
  .score-card .label { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .score-card .value { font-size: 2.4rem; font-weight: 700; margin-top: 0.3rem; }
  .score-card .unit { font-size: 0.9rem; color: var(--dim); }
  .green { color: var(--green); }
  .yellow { color: var(--yellow); }
  .red { color: var(--red); }
  .accent { color: var(--accent); }
  section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  section h2 {
    font-size: 1rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }
  ul { list-style: none; padding: 0; }
  li {
    padding: 0.45rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
  }
  li:last-child { border-bottom: none; }
  footer { color: var(--dim); font-size: 0.8rem; margin-top: 3rem; text-align: center; }
</style>
</head>
<body>
<h1>{{REPO_NAME}}</h1>
<p class="tagline">agentkit improve &mdash; target: <code>{{TARGET}}</code></p>

<div class="hero">
  <h2>Before / After</h2>
  <div class="score-row">
    <div class="score-card">
      <div class="label">Before</div>
      <div class="value yellow">{{BASELINE}}</div>
      <div class="unit">/100</div>
    </div>
    <div class="score-card">
      <div class="label">After</div>
      <div class="value green">{{FINAL}}</div>
      <div class="unit">/100</div>
    </div>
    <div class="score-card">
      <div class="label">Delta</div>
      <div class="value accent">{{DELTA}}</div>
      <div class="unit">pts</div>
    </div>
  </div>
</div>

<section>
  <h2>What we did</h2>
  <ul>{{ACTIONS_TAKEN}}</ul>
</section>

<section>
  <h2>What&rsquo;s still open</h2>
  <ul>{{ACTIONS_SKIPPED}}</ul>
</section>

<footer>Generated by agentkit improve</footer>
</body>
</html>
