name: Update GitHub Pages Stats

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install toml pytest && pip install -e ".[api]" --quiet

      - name: Get version from pyproject.toml
        id: version
        run: |
          python3 -c "
          import toml, pathlib
          data = toml.loads(pathlib.Path('pyproject.toml').read_text())
          print('VERSION=' + data['project']['version'])
          " >> $GITHUB_OUTPUT

      - name: Count passing tests
        id: tests
        run: |
          COUNT=$(python3 -m pytest --co -q 2>&1 | tail -1 | grep -oE '[0-9]+' | head -1 || echo 0)
          echo "COUNT=$COUNT" >> $GITHUB_OUTPUT

      - name: Update stats in docs/index.html
        run: |
          python3 - <<'EOF'
          import re, pathlib

          html_path = pathlib.Path("docs/index.html")
          html = html_path.read_text()

          import os
          count = os.environ.get("TEST_COUNT", "")
          version = os.environ.get("VERSION", "")

          if count:
              # Update test count stat
              html = re.sub(
                  r'(<div class="stat-value" data-stat="tests">)\d+(</div>)',
                  rf'\g<1>{count}\g<2>',
                  html,
              )

          if version:
              # Update versions stat (extract major.minor numeric part)
              parts = version.split(".")
              if len(parts) >= 2:
                  ver_num = int(parts[0]) * 100 + int(parts[1])
                  html = re.sub(
                      r'(<div class="stat-value" data-stat="versions">)\d+(</div>)',
                      rf'\g<1>{ver_num}\g<2>',
                      html,
                  )

          html_path.write_text(html)
          print(f"Updated: tests={count}, version={version}")
          EOF
        env:
          TEST_COUNT: ${{ steps.tests.outputs.COUNT }}
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Commit updated pages if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GitHub Pages stats [skip ci]"
            git push
          fi
