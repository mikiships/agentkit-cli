name: Update GitHub Pages Stats

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install toml pytest && pip install -e ".[api]" --quiet

      - name: Get version from pyproject.toml
        id: version
        run: |
          python3 -c "
          import toml, pathlib
          data = toml.loads(pathlib.Path('pyproject.toml').read_text())
          print('VERSION=' + data['project']['version'])
          " >> $GITHUB_OUTPUT

      - name: Count passing tests
        id: tests
        run: |
          COUNT=$(python3 -m pytest --co -q 2>&1 | tail -1 | grep -oE '[0-9]+' | head -1 || echo 0)
          echo "COUNT=$COUNT" >> $GITHUB_OUTPUT

      - name: Refresh front door from existing data
        run: |
          agentkit pages-refresh --from-existing-data \
            --frontdoor-version "${{ steps.version.outputs.VERSION }}" \
            --frontdoor-test-count "${{ steps.tests.outputs.COUNT }}"

      - name: Commit updated pages if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GitHub Pages stats [skip ci]"
            git push
          fi
