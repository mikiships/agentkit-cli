# agentkit project configuration
# Generated by: agentkit config init
# See: https://github.com/mikiships/agentkit-cli#project-configuration

[gate]
# Minimum composite score to pass the gate (0-100)
min_score = 75
# Maximum allowed score drop from baseline
max_drop = 10.0
# Fail if any tool regresses even within max_drop
fail_on_regression = false

[notify]
# Slack incoming webhook URL (or set AGENTKIT_SLACK_URL)
slack_url = ""
# Discord webhook URL (or set AGENTKIT_DISCORD_URL)
discord_url = ""
# Generic JSON webhook URL (or set AGENTKIT_WEBHOOK_URL)
webhook_url = ""
# When to send notifications: "always" | "fail" | "never"
on = "fail"

[run]
# Directory to store agentkit output artifacts
output_dir = ".agentkit"
# Optional label/tag for this project's runs (e.g. model name)
label = ""
# Record scores to local history DB
record_history = true

[sweep]
# Default targets for agentkit sweep (list of repo paths/URLs)
targets = []
# Sort results by: score, name, grade
sort_by = "score"
# Maximum number of results to display
limit = 20

[score]
# Weights for composite score calculation (must sum to 1.0)
[score.weights]
coderace = 0.3
agentlint = 0.3
agentmd = 0.2
agentreflect = 0.2
